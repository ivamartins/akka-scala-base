akka {
  loglevel = "INFO"
  http {
    server {
      idle-timeout = 60s
    }
  }
  persistence {
    journal {
      plugin = "akka.persistence.journal.inmemory"
      inmemory {
        # Uses the built-in in-memory journal (no Cassandra needed).
        # Data is lost on restart — fine for examples/tests.
      }
    }
    snapshot-store {
      plugin = "akka.persistence.snapshot-store.local"
      local {
        dir = "target/snapshots"
      }
    }
  }
}

# Disable akka-typed TypedActor default serializers warning
akka.actor.allow-java-serialization = on
